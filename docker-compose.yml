# ==========================================
# Servicios de Infraestructura
# ==========================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce-network

  # ==========================================
  # Servicios de Aplicación
  # ==========================================

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    container_name: ecommerce-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://ecommerce:${POSTGRES_PASSWORD:-ecommerce_secret}@postgres:5432/ecommerce?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - "4000:4000"
    networks:
      - ecommerce-network

  # Para desarrollo con hot reload, usar override:
  # docker compose -f docker-compose.yml -f docker-compose.dev.yml up

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    container_name: ecommerce-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ./.env
    environment:
      API_URL: http://api:4000
    ports:
      - "3000:3000"
    networks:
      - ecommerce-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
